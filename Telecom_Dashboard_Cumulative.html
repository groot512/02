<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)삼엠 - 통신사 회원 누계 현황 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sky: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.1), 0 4px 6px -2px rgba(14, 165, 233, 0.05); border-color: #bae6fd; }
        .bg-gradient-brand { background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%); }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-gradient-brand text-white p-6 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">📊 통신사 회원 누계 현황 대시보드</h1>
                <p class="text-sky-100 text-sm mt-2 font-medium">최종 기준: 2026-02-27 12:00 PM</p>
            </div>
            <div class="mt-4 md:mt-0">
                <span class="bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full">Company Confidential</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-6 mt-4">

        <!-- KPI Cards (Cumulative) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="card p-6 border-l-[6px] border-sky-500">
                <h3 class="text-slate-500 text-sm font-medium uppercase tracking-wider">총 누적 회원 수 (2월 27일 기준)</h3>
                <div class="flex items-baseline mt-2">
                    <p class="text-4xl font-extrabold text-slate-900" id="totalCumulativeMembers">0</p>
                    <span class="ml-2 text-sm font-medium text-sky-600">명</span>
                </div>
                <p class="text-sm font-bold text-emerald-500 mt-2" id="growthText">▲ 0명 (전월 대비)</p>
            </div>
            <div class="card p-6 border-l-[6px] border-sky-400">
                <h3 class="text-slate-500 text-sm font-medium uppercase tracking-wider">최다 누적 통신사</h3>
                <p class="text-3xl font-bold mt-2 text-slate-900" id="topCumulativeCarrier">-</p>
                <p class="text-sm font-medium text-sky-600 mt-1" id="topCumulativeCarrierCount">0명</p>
            </div>
            <div class="card p-6 border-l-[6px] border-sky-300">
                <h3 class="text-slate-500 text-sm font-medium uppercase tracking-wider">최다 누적 회원 유형</h3>
                <p class="text-3xl font-bold mt-2 text-slate-900" id="topCumulativeType">-</p>
                <p class="text-sm font-medium text-sky-600 mt-1" id="topCumulativeTypeCount">0명</p>
            </div>
        </div>

        <!-- Charts Section (Based on Cumulative Data) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Doughnut Chart: Carrier Share -->
            <div class="card p-6">
                <h3 class="text-lg font-bold mb-4 text-slate-700 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
                    </svg>
                    통신사별 누적 점유율
                </h3>
                <div class="relative h-72 w-full">
                    <canvas id="carrierChart"></canvas>
                </div>
            </div>

            <!-- Bar Chart: Member Type -->
            <div class="card p-6">
                <h3 class="text-lg font-bold mb-4 text-slate-700 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    회원 타입별 누적 분포
                </h3>
                <div class="relative h-72 w-full">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Tables Section (Matrix Format based on attached image) -->
        <div class="card p-6">
            <h3 class="text-lg font-bold mb-4 text-slate-700 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                회원타입 및 통신사별 상세 현황표 (2월 27일 기준)
            </h3>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-sm text-center text-slate-600">
                    <thead class="text-sm text-slate-700 bg-slate-100 font-bold border-b border-slate-300">
                        <tr>
                            <th scope="col" class="px-4 py-3 border-r border-slate-200 whitespace-nowrap">회원타입</th>
                            <th scope="col" class="px-4 py-3 whitespace-nowrap">SKT</th>
                            <th scope="col" class="px-4 py-3 whitespace-nowrap">KT</th>
                            <th scope="col" class="px-4 py-3 whitespace-nowrap">LG U+</th>
                            <th scope="col" class="px-4 py-3 whitespace-nowrap">SKT 알뜰폰</th>
                            <th scope="col" class="px-4 py-3 whitespace-nowrap">KT 알뜰폰</th>
                            <th scope="col" class="px-4 py-3 border-r border-slate-200 whitespace-nowrap">LG U+ 알뜰폰</th>
                            <th scope="col" class="px-4 py-3 text-slate-900 bg-slate-200 whitespace-nowrap">총합</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="divide-y divide-slate-200 bg-white">
                        <!-- JS Injection -->
                    </tbody>
                    <tfoot class="font-bold bg-sky-50 text-slate-900 border-t-2 border-slate-300" id="matrixTableFoot">
                        <!-- JS Injection -->
                    </tfoot>
                </table>
            </div>
        </div>

    </main>

    <footer class="text-center p-8 text-slate-500 text-sm font-medium">
        ⓒ 2026 (주)삼엠. All rights reserved.
    </footer>

    <script>
        // 1. Corrected Data Definitions (2월 누계 데이터가 최종)
        const febData = [
            { type: "보훈대상자", skt: 4264, kt: 2674, lg: 1897, skt_mvno: 155, kt_mvno: 340, lg_mvno: 351 },
            { type: "보훈가족", skt: 1678, kt: 1151, lg: 750, skt_mvno: 89, kt_mvno: 212, lg_mvno: 248 },
            { type: "제대군인", skt: 6443, kt: 5172, lg: 4274, skt_mvno: 564, kt_mvno: 1612, lg_mvno: 2072 },
            { type: "참여기업", skt: 34, kt: 35, lg: 24, skt_mvno: 2, kt_mvno: 9, lg_mvno: 4 }
        ];
        
        const janTotal = 28131; // 1월 29일 기준 총계

        // 2. Data Processing Logic
        let totalFeb = 0;
        const carrierTotals = { 'SKT': 0, 'KT': 0, 'LG U+': 0, 'SKT 알뜰폰': 0, 'KT 알뜰폰': 0, 'LG U+ 알뜰폰': 0 };
        const typeTotals = {};

        const tbody = document.getElementById('matrixTableBody');
        const tfoot = document.getElementById('matrixTableFoot');

        // Populate Matrix Table exactly like the image
        febData.forEach(row => {
            const rowTotal = row.skt + row.kt + row.lg + row.skt_mvno + row.kt_mvno + row.lg_mvno;
            totalFeb += rowTotal;
            typeTotals[row.type] = rowTotal;
            
            carrierTotals['SKT'] += row.skt;
            carrierTotals['KT'] += row.kt;
            carrierTotals['LG U+'] += row.lg;
            carrierTotals['SKT 알뜰폰'] += row.skt_mvno;
            carrierTotals['KT 알뜰폰'] += row.kt_mvno;
            carrierTotals['LG U+ 알뜰폰'] += row.lg_mvno;

            const tr = document.createElement('tr');
            tr.className = "hover:bg-sky-50 transition-colors";
            tr.innerHTML = `
                <td class="px-4 py-3 font-bold text-slate-800 border-r border-slate-200 text-left">${row.type}</td>
                <td class="px-4 py-3">${row.skt.toLocaleString()}</td>
                <td class="px-4 py-3">${row.kt.toLocaleString()}</td>
                <td class="px-4 py-3">${row.lg.toLocaleString()}</td>
                <td class="px-4 py-3">${row.skt_mvno.toLocaleString()}</td>
                <td class="px-4 py-3">${row.kt_mvno.toLocaleString()}</td>
                <td class="px-4 py-3 border-r border-slate-200">${row.lg_mvno.toLocaleString()}</td>
                <td class="px-4 py-3 font-bold text-slate-900 bg-slate-50">${rowTotal.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });

        // Add Footer Row (총계)
        tfoot.innerHTML = `
            <tr>
                <td class="px-4 py-4 border-r border-slate-200 text-left">총계</td>
                <td class="px-4 py-4">${carrierTotals['SKT'].toLocaleString()}</td>
                <td class="px-4 py-4">${carrierTotals['KT'].toLocaleString()}</td>
                <td class="px-4 py-4">${carrierTotals['LG U+'].toLocaleString()}</td>
                <td class="px-4 py-4">${carrierTotals['SKT 알뜰폰'].toLocaleString()}</td>
                <td class="px-4 py-4">${carrierTotals['KT 알뜰폰'].toLocaleString()}</td>
                <td class="px-4 py-4 border-r border-slate-200">${carrierTotals['LG U+ 알뜰폰'].toLocaleString()}</td>
                <td class="px-4 py-4 text-sky-700 bg-sky-100 text-lg">${totalFeb.toLocaleString()}</td>
            </tr>
        `;

        // Calculate Growth
        const growth = totalFeb - janTotal;

        // Convert to Arrays for Chart.js
        const sortedCarriers = Object.entries(carrierTotals).sort((a, b) => b[1] - a[1]);
        const sortedTypes = Object.entries(typeTotals).sort((a, b) => b[1] - a[1]);

        // 3. Update KPI DOM Elements
        document.getElementById('totalCumulativeMembers').innerText = totalFeb.toLocaleString();
        document.getElementById('growthText').innerText = `▲ ${growth.toLocaleString()}명 (1월 대비 성장)`;
        document.getElementById('topCumulativeCarrier').innerText = sortedCarriers[0][0];
        document.getElementById('topCumulativeCarrierCount').innerText = sortedCarriers[0][1].toLocaleString() + "명";
        document.getElementById('topCumulativeType').innerText = sortedTypes[0][0];
        document.getElementById('topCumulativeTypeCount').innerText = sortedTypes[0][1].toLocaleString() + "명";

        // 4. Chart Configuration
        const themeColors = { primary: '#0ea5e9', dark: '#0284c7', slate: '#64748b', tertiary: '#bae6fd' };

        // ** 사용자 요청 및 이미지 기반 커스텀 컬러맵 (스왑 보정 적용) **
        const carrierColorMap = {
            'SKT': '#E02830',          // 요청하신 KT색(빨강) -> 이미지 맞춰 SKT로 스왑
            'KT': '#3617CE',           // 요청하신 SKT색(파랑) -> 이미지 맞춰 KT로 스왑
            'LG U+': '#E6007E',        // 요청하신 핑크
            'LG U+ 알뜰폰': '#F59E0B',   // 이미지 기준 주황색
            'KT 알뜰폰': '#10B981',      // 이미지 기준 초록색
            'SKT 알뜰폰': '#8B5CF6'      // 이미지 기준 보라색
        };

        const chartColors = sortedCarriers.map(item => carrierColorMap[item[0]]);

        Chart.defaults.font.family = "'Noto Sans KR', sans-serif";
        Chart.defaults.color = themeColors.slate;

        // Carrier Chart (Doughnut)
        new Chart(document.getElementById('carrierChart'), {
            type: 'doughnut',
            data: {
                labels: sortedCarriers.map(i => i[0]),
                datasets: [{
                    data: sortedCarriers.map(i => i[1]),
                    backgroundColor: chartColors,
                    borderWidth: 2,
                    borderColor: '#ffffff',
                    hoverOffset: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '55%',
                plugins: {
                    legend: { position: 'right', labels: { boxWidth: 12, padding: 15, usePointStyle: true, font: { size: 13 } } }
                }
            }
        });

        // Type Chart (Bar)
        new Chart(document.getElementById('typeChart'), {
            type: 'bar',
            data: {
                labels: sortedTypes.map(i => i[0]),
                datasets: [{
                    label: '누적 회원 수',
                    data: sortedTypes.map(i => i[1]),
                    backgroundColor: themeColors.primary,
                    hoverBackgroundColor: themeColors.dark,
                    borderRadius: 6,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { display: true, color: '#f1f5f9' } },
                    x: { grid: { display: false }, ticks: { font: { weight: '500' } } }
                }
            }
        });
    </script>
</body>
</html>
